version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devboard
      POSTGRES_PASSWORD: devboardpassword
      POSTGRES_DB: devboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://devboard:devboardpassword@db:5432/devboard?schema=public
      - JWT_SECRET=devboard_super_secret_docker_key
      - PORT=5000
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
